{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <h1 class="mb-4">Register</h1>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-success">Sign Up</button>
            <a href="{% url 'login' %}" class="btn btn-outline-secondary ms-2">Login</a>
        </form>
    </div>
</div>
{% endblock %}
