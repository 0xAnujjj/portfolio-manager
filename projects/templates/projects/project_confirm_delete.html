{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center">
        <h1>Delete "{{ project.title }}"?</h1>
        <p class="text-muted">This cannot be undone.</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger me-2">Yes, delete it</button>
        </form>
        <a href="{% url 'project_detail' project.pk %}" class="btn btn-outline-secondary mt-2">Cancel</a>
    </div>
</div>
{% endblock %}
