<!DOCTYPE html>
<html>
    <head>
        <title>Delete Project</title>
    </head>
    <body>
        <h1>Delete "{{project.title}}"?</h1>
        <p>This cannot be undone.</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit">Yes, delete it</button>
        </form>
        <a href="{% url 'project_detail' project.pk %}">Cancel</a>
    </body>
</html>
