{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>My Projects</h1>
</div>

<div class="row">
    {% for project in projects %}
    <div class="col-md-4 mb-4">
        <div class="card h-100 shadow-sm">
            {% if project.thumbnail %}
                <img src="{{ project.thumbnail.url }}" class="card-img-top" style="height: 200px; object-fit: cover;">
            {% endif %}
            <div class="card-body">
                <h5 class="card-title">{{ project.title }}</h5>
                <p class="card-text text-muted">{{ project.description|truncatewords:20 }}</p>
                {% if project.tech_stack %}
                    <p><span class="badge bg-secondary">{{ project.tech_stack }}</span></p>
                {% endif %}
            </div>
            <div class="card-footer">
                <a href="{% url 'project_detail' project.pk %}" class="btn btn-primary btn-sm">View</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
