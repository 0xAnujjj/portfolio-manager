<!DOCTYPE html>
<html>
<head>
    <title>My Projects</title>
</head>
<body>
    <h1>My Portfolio Projects</h1>

    {% for project in projects %}
        <div>
            <h2><a href="{% url 'project_detail' project.pk %}">{{ project.title }}</a></h2>
            <p>{{ project.description }}</p>
            <small>Created: {{ project.created_at }}</small>
        </div>
        <hr>
    {% endfor %}
</body>
</html>
